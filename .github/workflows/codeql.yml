name: CodeQL

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 6 * * 1'

jobs:
  codeql:
    uses: chagnti/appsec-codeql-central/.github/workflows/reusable-codeql.yml@main
    with:
      language: java
      config-file: .github/codeql/codeql-config.yml
      build-command: mvn clean package -DskipTests -Dmaven.compiler.source=8 -Dmaven.compiler.target=8
      ram: 4096
      threads: 2
      upload-artifact: true
    permissions:
      security-events: write
      actions: read
      contents: read
